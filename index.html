<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <title>LoL Stat Impact Calculator</title>
  </head>
  <body class="bg-dark text-light">
    <main class="container py-5">
      <header class="mb-4">
        <h1 class="fw-bold">League of Legends Stat Impact Calculator</h1>
        <p class="lead mb-0">
          Pick any champion and stack items, dragons, runes, and custom effects
          to instantly see stat changes.
        </p>
      </header>

      <section class="card bg-black border-secondary shadow-sm mb-4">
        <div class="card-body row g-3 align-items-end">
          <div class="col-lg-6">
            <label for="championSelect" class="form-label">Champion</label>
            <select id="championSelect" class="form-select"></select>
          </div>
          <div class="col-lg-3">
            <label for="championLevel" class="form-label">Level</label>
            <input
              id="championLevel"
              type="number"
              min="1"
              max="18"
              value="18"
              class="form-control"
            />
          </div>
          <div class="col-lg-3">
            <button id="resetBtn" class="btn btn-outline-light w-100">
              Reset selections
            </button>
          </div>
        </div>
      </section>

      <div class="row g-4">
        <section class="col-lg-7">
          <div class="card bg-black border-secondary h-100">
            <div class="card-header border-secondary">
              <h2 class="h5 mb-0">Apply Effects</h2>
            </div>
            <div class="card-body">
              <div class="mb-4">
                <h3 class="h6 text-info">Items</h3>
                <div id="itemList" class="modifier-grid"></div>
              </div>
              <div class="mb-4">
                <h3 class="h6 text-info">Dragons</h3>
                <div id="dragonList" class="modifier-grid"></div>
              </div>
              <div class="mb-4">
                <h3 class="h6 text-info">Runes / Buffs</h3>
                <div id="buffList" class="modifier-grid"></div>
              </div>
              <div>
                <h3 class="h6 text-info">Custom Stat Modifier</h3>
                <form id="customModifierForm" class="row g-2">
                  <div class="col-md-4">
                    <input
                      type="text"
                      id="customName"
                      class="form-control"
                      placeholder="Name"
                      required
                    />
                  </div>
                  <div class="col-md-4">
                    <select id="customStat" class="form-select" required></select>
                  </div>
                  <div class="col-md-2">
                    <input
                      type="number"
                      step="0.1"
                      id="customAmount"
                      class="form-control"
                      placeholder="Amount"
                      required
                    />
                  </div>
                  <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary">Add</button>
                  </div>
                </form>
                <ul id="customList" class="list-group list-group-flush mt-3"></ul>
              </div>
            </div>
          </div>
        </section>

        <section class="col-lg-5">
          <div class="card bg-black border-secondary mb-4">
            <div class="card-header border-secondary">
              <h2 class="h5 mb-0">Stat Comparison</h2>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-dark table-sm align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Stat</th>
                      <th>Base</th>
                      <th>Final</th>
                      <th>Δ</th>
                    </tr>
                  </thead>
                  <tbody id="statTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>

          <div class="card bg-black border-secondary">
            <div class="card-header border-secondary d-flex justify-content-between">
              <h2 class="h5 mb-0">Active Effects</h2>
              <button id="exportBtn" class="btn btn-sm btn-outline-info">
                Export CSV
              </button>
            </div>
            <div class="card-body">
              <ul id="activeEffects" class="list-group list-group-flush"></ul>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
